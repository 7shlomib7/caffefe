<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Caffefe ☕</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4A843;--gold-dim:rgba(212,168,67,0.15);--gold-border:rgba(212,168,67,0.25);--bg:#0C0A06;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);--text:#F5EDD8;--muted:#8A7355;--muted2:#5A4A30}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);direction:rtl;min-height:100vh}
.app{min-height:100vh;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(212,168,67,0.12) 0%,transparent 70%),var(--bg)}
.display{font-family:'Playfair Display',serif}
.btn-primary{background:linear-gradient(135deg,#D4A843,#A07820);color:#0C0A06;border:none;border-radius:50px;padding:16px 48px;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.25s;box-shadow:0 8px 32px rgba(212,168,67,0.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(212,168,67,0.45)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--gold-border);color:var(--gold);border-radius:50px;padding:10px 24px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.btn-ghost:hover{background:var(--gold-dim)}
.chip{border:1px solid rgba(255,255,255,0.1);background:var(--surface);border-radius:12px;padding:10px 16px;font-size:13.5px;color:#C8A87A;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s;text-align:right;width:100%}
.chip:hover:not(:disabled){border-color:var(--gold-border);background:var(--gold-dim);color:var(--text)}
.chip.on{background:linear-gradient(135deg,rgba(212,168,67,0.25),rgba(160,120,32,0.2));border-color:var(--gold);color:var(--gold);font-weight:600}
.chip:disabled{opacity:0.3;cursor:not-allowed}
.card{background:var(--surface);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:20px;transition:border-color 0.2s;margin-bottom:12px}
.card:hover{border-color:var(--gold-border)}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:8px;padding:3px 10px;font-size:12px;color:var(--gold);margin:3px}
.info-box{background:rgba(212,168,67,0.07);border:1px solid rgba(212,168,67,0.2);border-radius:12px;padding:12px 16px;font-size:13px;color:#9A7840;line-height:1.7;border-right:3px solid rgba(212,168,67,0.5);margin-bottom:14px}
textarea{width:100%;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 16px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;resize:vertical;direction:rtl;min-height:80px;outline:none;transition:border 0.2s}
textarea:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px rgba(212,168,67,0.1)}
textarea::placeholder{color:var(--muted2)}
.tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;border-radius:11px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s;border:1px solid rgba(255,255,255,0.08);background:var(--surface);color:#6A4A30;display:flex;align-items:center;gap:5px}
.tab.active{background:rgba(212,168,67,0.22);border-color:var(--gold);color:var(--gold);font-weight:600}
.badge{background:#D4A843;color:#0C0A06;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:700}
.section-box{background:var(--surface);border:1px solid rgba(212,168,67,0.18);border-radius:18px;padding:20px;margin-bottom:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gold);display:inline-block;animation:bounce 1.2s infinite ease-in-out}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.4s ease both}
a{color:var(--gold);text-decoration:underline}
a:hover{opacity:0.8}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(212,168,67,0.2);border-radius:2px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.tip-card{background:var(--surface);border:1px solid rgba(255,255,255,0.07);border-radius:13px;padding:13px}
.grind-box{background:rgba(212,168,67,0.07);border:1px solid rgba(212,168,67,0.18);border-radius:12px;padding:13px;margin-bottom:10px}
.brew-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:13px;margin-bottom:10px}
.sel-summary{margin-bottom:16px;padding:13px 15px;background:rgba(212,168,67,0.05);border-radius:13px;border:1px solid rgba(212,168,67,0.12)}
.hero{text-align:center;padding:28px;margin-bottom:22px;background:linear-gradient(135deg,rgba(212,168,67,0.15),rgba(140,80,5,0.07));border-radius:22px;border:1px solid rgba(212,168,67,0.3)}
.match-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:6px}
.match-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#D4A843,#70C870)}
.buy-card{background:rgba(212,168,67,0.06);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px}
.cafe-card{background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const PARAMS = [
  {id:"strength",label:"עוצמה",icon:"⚡",description:"מידת האינטנסיביות של הקפה.",options:["עדין מאוד","עדין","בינוני","חזק","חזק מאוד","אקספרסו כפול"],optionDesc:{"עדין מאוד":"כמעט מימי","עדין":"קל ונעים","בינוני":"איזון קלאסי","חזק":"טעם בולט","חזק מאוד":"אינטנסיבי","אקספרסו כפול":"מקסימום עוצמה"}},

  {id:"aroma",label:"ארומה",icon:"🌸",description:"עוצמת הריח מהכוס.",options:["עדינה","בינונית","אינטנסיבית","פירותית","שרופה","מתוקה","פרחונית","עצית"],optionDesc:{"עדינה":"ריח שקט","בינונית":"ריח נוכח","אינטנסיבית":"ריח עז","פירותית":"ריח פירותי","שרופה":"ריח קלוי","מתוקה":"ריח קרמל","פרחונית":"ריח ג׳סמין","עצית":"ריח עץ"}},
  {id:"caffeine",label:"קפאין",icon:"⚗️",description:"רמת הקפאין בכוס.",options:["ללא קפאין (Decaf)","נמוכה","בינונית","גבוהה","מקסימלית"],optionDesc:{"ללא קפאין (Decaf)":"97%+ הוסר","נמוכה":"~70mg","בינונית":"~100mg","גבוהה":"~150mg","מקסימלית":"200mg+"}},
  {id:"milk",label:"חלב",icon:"🥛",description:"סוג החלב המועדף.",options:["ללא חלב","חלב פרה","חלב שיבולת שועל","חלב שקדים","חלב סויה","חלב קוקוס","קצפת"],optionDesc:{"ללא חלב":"הקפה בטהרתו","חלב פרה":"קרמי וסמיך","חלב שיבולת שועל":"הכי פופולרי","חלב שקדים":"קליל עם אגוז","חלב סויה":"ניטרלי","חלב קוקוס":"טרופי","קצפת":"עשירה מאוד"}},
  {id:"organic",label:"אורגני",icon:"🌿",description:"העדפות אורגני / Fair Trade.",options:["לא חשוב","מועדף אורגני","אורגני בלבד","Fair Trade","אורגני + Fair Trade","Rainforest Alliance"],optionDesc:{"לא חשוב":"מתמקד בטעם","מועדף אורגני":"אם אפשר","אורגני בלבד":"חייב תעודה","Fair Trade":"מחיר הוגן","אורגני + Fair Trade":"ירוק והוגן","Rainforest Alliance":"תקן סביבתי"}},
  {id:"roast",label:"קלייה",icon:"🔥",description:"רמת הקלייה — בהירה=פירותי, כהה=מריר.",options:["Light (בהירה)","Medium (בינונית)","Medium-Dark","Dark (כהה)","French / Italian"],optionDesc:{"Light (בהירה)":"פירותי, חמיצות","Medium (בינונית)":"האיזון המושלם","Medium-Dark":"פחות חמיצות","Dark (כהה)":"מריר, שוקולדי","French / Italian":"מריר מאוד"}},
  {id:"origin",label:"מקור",icon:"🌍",description:"אזור גידול הפולים.",options:["אתיופיה","קולומביה","ברזיל","קניה","גואטמלה","קוסטה ריקה","תימן","פנמה (Geisha)","ג׳אווה","הוואי (Kona)","ג׳מייקה","לא חשוב"],optionDesc:{"אתיופיה":"פרחוני, פירות יער","קולומביה":"קלאסי ומאוזן","ברזיל":"אגוזי, שוקולדי","קניה":"חמיצות וינית","גואטמלה":"שוקולד, קרמל","קוסטה ריקה":"נקי ומעודן","תימן":"ספייסי, יין","פנמה (Geisha)":"פרחוני נדיר","ג׳אווה":"ארצי, עשן","הוואי (Kona)":"עדין, יוקרתי","ג׳מייקה":"Blue Mountain","לא חשוב":"פתוח לכל מקור"}},
  {id:"body",label:"גוף",icon:"🌊",description:"תחושת הסמיכות על הלשון.",options:["קל ומימי","בינוני","מלא וסמיך","קרמי מאוד","Velvet"],optionDesc:{"קל ומימי":"זורם ושקוף","בינוני":"נוכחות מורגשת","מלא וסמיך":"כבד ועשיר","קרמי מאוד":"כמו שוקולד חם","Velvet":"קטיפתי"}},
  {id:"acidity",label:"חומציות",icon:"🍋",description:"חומציות טובה = עירנות.",options:["ללא חומציות","נמוכה","בינונית","גבוהה","בהירה ומרעננת"],optionDesc:{"ללא חומציות":"לקיבות רגישות","נמוכה":"כמעט לא מורגשת","בינונית":"נעימה","גבוהה":"בצדדי הלשון","בהירה ומרעננת":"כמו הדרים"}},
  {id:"sweetness",label:"מתיקות",icon:"🍯",description:"מתיקות טבעית ללא סוכר.",options:["ללא מתיקות","קצת מתוק","בינוני","מתוק","מתוק מאוד"],optionDesc:{"ללא מתיקות":"מריר נקי","קצת מתוק":"נגיעה עדינה","בינוני":"קרמלי","מתוק":"Natural Process","מתוק מאוד":"כמו פרי בשל"}},
  {id:"preparation",label:"הכנה",icon:"☕",description:"שיטת ההכנה קובעת את הטעם.",options:["אספרסו","פילטר / V60","פרנץ׳ פרס","אירופרס","מוקה פוט","Cold Brew","Chemex","קפה טורקי","Drip מכונה"],optionDesc:{"אספרסו":"לחץ גבוה, 30 שניות","פילטר / V60":"קפה נקי וצלול","פרנץ׳ פרס":"גוף מלא","אירופרס":"נקי וחזק","מוקה פוט":"אספרסו ביתי","Cold Brew":"מתוק וחלק","Chemex":"נקי מאוד","קפה טורקי":"עז וסמיך","Drip מכונה":"נוח ועקבי"}},
  {id:"grind",label:"טחינה",icon:"⚙️",description:"גודל חלקיקי הטחינה.",options:["עדינה מאוד (Espresso)","עדינה (Moka)","בינונית (Drip)","בינונית-גסה (V60)","גסה (French Press)","גסה מאוד (Cold Brew)","לפי המלצה"],optionDesc:{"עדינה מאוד (Espresso)":"כמו אבקה","עדינה (Moka)":"לסיר הביתי","בינונית (Drip)":"למכונת פילטר","בינונית-גסה (V60)":"3-4 דקות","גסה (French Press)":"שרייה ארוכה","גסה מאוד (Cold Brew)":"שרייה של שעות","לפי המלצה":"AI ממליץ"}},
  {id:"process",label:"עיבוד",icon:"🫒",description:"שיטת עיבוד הפרי.",options:["Natural (יבש)","Washed (רטוב)","Honey Process","Anaerobic","לא חשוב"],optionDesc:{"Natural (יבש)":"מתיקות ופירות","Washed (רטוב)":"נקי וחמוץ","Honey Process":"בין Natural ל-Washed","Anaerobic":"טעמים מורכבים","לא חשוב":"לא מתמקד"}},
];

const MAX_SEL = 3;

const buildPrompt = (selText, freeText, loc) => `אתה מומחה קפה Q-Grader עם ידע עמוק בשוק הקפה הישראלי.
המשתמש מחפש: ${freeText ? `"${freeText}" ` : ""}${selText}${loc ? ` | מיקום: ${loc}` : ""}

ענה ב-JSON בלבד ללא backticks:
{"coffeeMatch":{"name":"שם","description":"תיאור","whyMatch":"למה"},"topBean":{"name":"שם הפולים","variety":"זן","origin":"מקור","roaster":"קולה","roastLevel":"קלייה","process":"עיבוד","flavorNotes":"טעמים","matchScore":98,"matchExplanation":"למה הכי מתאים","grind":{"method":"שיטה","size":"דרגה","texture":"מרקם"},"brew":{"ratio":"יחס","temp":"טמפ","time":"זמן","steps":"הוראות"},"stores":[{"name":"שם","address":"כתובת","city":"עיר","url":"https://...","distance":"קרוב/בינוני/רחוק"}],"online":[{"name":"שם","url":"https://...","price":"מחיר","ships":"משלוח"}],"cafes":[{"name":"שם","address":"כתובת","city":"עיר","specialty":"מה מיוחד","distance":"קרוב/בינוני/רחוק"}],"tip":"טיפ"},"alternatives":[{"name":"שם","origin":"מקור","roaster":"קולה","roastLevel":"קלייה","flavorNotes":"טעמים","matchScore":85,"matchExplanation":"במה דומה/שונה","grind":{"method":"שיטה","size":"דרגה"},"brew":{"ratio":"יחס","temp":"טמפ","time":"זמן"},"stores":[{"name":"שם","url":"https://...","price":"מחיר"}]}],"tips":{"grind":"טחינה","storage":"אחסון","freshness":"טריות"}}

חשוב: תן בדיוק 5 פולים ב-alternatives מהכי מתאים לפחות. כל פול עם מקומות רכישה אמיתיים בישראל.`;

function MatchBar({score}) {
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
        <span style={{color:"#8A7355"}}>התאמה לפרמטרים</span>
        <span style={{color:"#70C870",fontWeight:700}}>{score}%</span>
      </div>
      <div className="match-bar">
        <div className="match-fill" style={{width:`${score}%`}}/>
      </div>
    </div>
  );
}

function BuySection({stores, online, cafes}) {
  if (!stores?.length && !online?.length && !cafes?.length) return null;
  return (
    <div style={{marginTop:12}}>
      {stores?.length>0&&<div style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:"#D4A843",marginBottom:6}}>🏪 חנויות פיזיות</div>
        {stores.map((s,i)=>(
          <div key={i} className="buy-card">
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#C8A87A",fontWeight:600}}>{s.name}</span>
              {s.distance&&<span style={{fontSize:11,color:s.distance==="קרוב"?"#70C870":"#8A7355"}}>{s.distance}</span>}
            </div>
            {s.address&&<div style={{color:"#6A4A30",marginTop:2}}>📍 {s.address}{s.city?`, ${s.city}`:""}</div>}
            {s.price&&<div style={{color:"#D4A843",marginTop:2}}>{s.price}</div>}
            {s.url&&s.url.startsWith("http")&&<a href={s.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",marginTop:4,fontSize:12}}>🔗 לאתר</a>}
          </div>
        ))}
      </div>}
      {online?.length>0&&<div style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:"#D4A843",marginBottom:6}}>📦 הזמנה אונליין</div>
        {online.map((s,i)=>(
          <div key={i} className="buy-card">
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#C8A87A",fontWeight:600}}>{s.name}</span>
              {s.price&&<span style={{color:"#D4A843"}}>{s.price}</span>}
            </div>
            {s.ships&&<div style={{color:"#6A4A30",marginTop:2}}>🚚 {s.ships}</div>}
            {s.url&&s.url.startsWith("http")&&<a href={s.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",marginTop:4,fontSize:12}}>🔗 לאתר הרכישה</a>}
          </div>
        ))}
      </div>}
      {cafes?.length>0&&<div>
        <div style={{fontSize:12,fontWeight:700,color:"#D4A843",marginBottom:6}}>☕ בתי קפה</div>
        {cafes.map((c,i)=>(
          <div key={i} className="cafe-card">
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#C8A87A",fontWeight:600}}>{c.name}</span>
              {c.distance&&<span style={{fontSize:11,color:c.distance==="קרוב"?"#70C870":"#8A7355"}}>{c.distance}</span>}
            </div>
            {c.address&&<div style={{color:"#6A4A30",marginTop:2}}>📍 {c.address}{c.city?`, ${c.city}`:""}</div>}
            {c.specialty&&<div style={{color:"#8A7355",marginTop:2}}>✨ {c.specialty}</div>}
          </div>
        ))}
      </div>}
    </div>
  );
}

function BeanCard({bean, isTop, idx}) {
  const [open, setOpen] = useState(isTop);
  return (
    <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${open?(isTop?"rgba(212,168,67,0.5)":"rgba(212,168,67,0.2)"):"rgba(255,255,255,0.08)"}`,borderRadius:20,marginBottom:12,overflow:"hidden"}}>
      <div style={{padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:12}} onClick={()=>setOpen(o=>!o)}>
        <div style={{width:30,height:30,borderRadius:9,background:isTop?"linear-gradient(135deg,#D4A843,#A07820)":"rgba(212,168,67,0.2)",display:"flex",alignItems:"center",justifyContent:"center",color:isTop?"#0C0A06":"#D4A843",fontWeight:800,fontSize:13,flexShrink:0}}>
          {isTop?"★":idx+1}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <h4 style={{fontSize:15.5,color:"#F5EDD8",fontWeight:600,marginBottom:3}}>{bean.name}</h4>
          <div style={{display:"flex",flexWrap:"wrap",marginTop:4}}>
            {bean.origin&&<span className="tag">🌍 {bean.origin}</span>}
            {bean.roastLevel&&<span className="tag">🔥 {bean.roastLevel}</span>}
            {bean.matchScore&&<span className="tag" style={{background:"rgba(100,200,100,0.1)",borderColor:"rgba(100,200,100,0.3)",color:"#70C870"}}>✓ {bean.matchScore}%</span>}
          </div>
          {bean.matchScore&&<MatchBar score={bean.matchScore}/>}
        </div>
        <span style={{fontSize:17,color:"#4A3A20",display:"block",transform:open?"rotate(180deg)":"none",flexShrink:0,transition:"transform 0.2s"}}>▾</span>
      </div>
      {open&&<div style={{padding:"0 18px 18px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
        {bean.matchExplanation&&<div style={{padding:"10px 12px",background:"rgba(100,200,100,0.06)",borderRadius:10,marginBottom:10,fontSize:13,color:"#8A9A80",lineHeight:1.6}}>💡 {bean.matchExplanation}</div>}
        {bean.flavorNotes&&<div style={{padding:"8px 0",fontSize:13.5,color:"#C8A87A"}}><span style={{color:"#6A4A30"}}>טעמים: </span>{bean.flavorNotes}</div>}
        {(bean.grind||bean.variety||bean.process)&&<div className="grind-box">
          <div style={{fontSize:13,fontWeight:700,color:"#D4A843",marginBottom:8}}>⚙️ טחינה והכנה</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 14px",fontSize:13}}>
            {bean.variety&&<div><span style={{color:"#5A4A30"}}>זן: </span><span style={{color:"#D4C090"}}>{bean.variety}</span></div>}
            {bean.process&&<div><span style={{color:"#5A4A30"}}>עיבוד: </span><span style={{color:"#D4C090"}}>{bean.process}</span></div>}
            {bean.grind?.method&&<div><span style={{color:"#5A4A30"}}>שיטה: </span><span style={{color:"#D4C090"}}>{bean.grind.method}</span></div>}
            {bean.grind?.size&&<div><span style={{color:"#5A4A30"}}>דרגה: </span><span style={{color:"#D4C090"}}>{bean.grind.size}</span></div>}
            {bean.grind?.texture&&<div style={{gridColumn:"1/-1"}}><span style={{color:"#5A4A30"}}>מרקם: </span><span style={{color:"#D4C090"}}>{bean.grind.texture}</span></div>}
          </div>
        </div>}
        {bean.brew&&<div className="brew-box">
          <div style={{fontSize:13,fontWeight:700,color:"#C8A87A",marginBottom:8}}>☕ אופן הכנה</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 14px",fontSize:13}}>
            {bean.brew.ratio&&<div><span style={{color:"#5A4A30"}}>יחס: </span><span style={{color:"#D4C090"}}>{bean.brew.ratio}</span></div>}
            {bean.brew.temp&&<div><span style={{color:"#5A4A30"}}>טמפ׳: </span><span style={{color:"#D4C090"}}>{bean.brew.temp}</span></div>}
            {bean.brew.time&&<div><span style={{color:"#5A4A30"}}>זמן: </span><span style={{color:"#D4C090"}}>{bean.brew.time}</span></div>}
          </div>
          {bean.brew.steps&&<div style={{fontSize:13,color:"#8A7355",lineHeight:1.7,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:9,marginTop:8}}>{bean.brew.steps}</div>}
        </div>}
        <BuySection stores={bean.stores} online={bean.online} cafes={bean.cafes}/>
        {bean.tip&&<div style={{marginTop:10,fontSize:13,color:"#D4A843",background:"rgba(212,168,67,0.06)",borderRadius:10,padding:"9px 13px"}}>💡 {bean.tip}</div>}
      </div>}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("intro");
  const [sel, setSel] = useState({});
  const [freeText, setFreeText] = useState("");
  const [activeIdx, setActiveIdx] = useState(0);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [locName, setLocName] = useState("");
  const [showInfo, setShowInfo] = useState(false);

  useEffect(()=>{
    navigator.geolocation?.getCurrentPosition(pos=>{
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)
        .then(r=>r.json()).then(d=>setLocName(d.address?.city||d.address?.town||"")).catch(()=>{});
    },()=>{});
  },[]);

  const toggle=(id,val)=>{
    setSel(prev=>{
      const cur=prev[id]||[];
      if(cur.includes(val)) return {...prev,[id]:cur.filter(v=>v!==val)};
      if(cur.length>=MAX_SEL) return prev;
      return {...prev,[id]:[...cur,val]};
    });
  };

  const isOn=(id,val)=>(sel[id]||[]).includes(val);
  const cnt=id=>(sel[id]||[]).length;
  const totalFilled=Object.values(sel).filter(v=>v?.length).length;
  const pct=Math.round((totalFilled/PARAMS.length)*100);
  const canSearch=totalFilled>=1||freeText.trim().length>3;
  const ap=PARAMS[activeIdx];

  const search=async()=>{
    setLoading(true);setError("");setResult(null);
    try{
      const selText=Object.entries(sel).filter(([,v])=>v?.length).map(([k,v])=>`${PARAMS.find(p=>p.id===k)?.label||k}: ${v.join(", ")}`).join(" | ");
      const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({max_tokens:3000,messages:[{role:"user",content:buildPrompt(selText,freeText,locName)}]})});
      const data=await res.json();
      const txt=data.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
      const clean=txt.replace(/```json|```/g,"").trim();
      const s=clean.indexOf("{"),e=clean.lastIndexOf("}");
      if(s===-1) throw new Error("no json");
      setResult(JSON.parse(clean.slice(s,e+1)));
      setScreen("result");
    }catch(err){setError("שגיאה בטעינת ההמלצות — נסה שוב");}
    finally{setLoading(false);}
  };

  if(loading) return(
    <div className="app" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:20}}>
      <div style={{fontSize:48}}>☕</div>
      <div style={{display:"flex",gap:8}}><div className="dot"/><div className="dot"/><div className="dot"/></div>
      <p style={{color:"#8A7355",fontSize:15}}>מנתח את ההעדפות שלך...</p>
    </div>
  );

  if(screen==="intro") return(
    <div className="app">
      <div style={{maxWidth:520,margin:"0 auto",padding:"56px 20px",textAlign:"center"}}>
        <div style={{fontSize:60,marginBottom:14,filter:"drop-shadow(0 8px 24px rgba(212,168,67,0.5))"}}>☕</div>
        <h1 className="display" style={{fontSize:"clamp(30px,8vw,50px)",fontWeight:900,color:"#F5EDD8",lineHeight:1.1,marginBottom:10}}>
          Caffefe<br/><span style={{color:"#D4A843",fontSize:"0.7em"}}>מוצא הקפה המושלם</span>
        </h1>
        <p style={{fontSize:15,color:"#8A7355",lineHeight:1.8,marginBottom:28}}>תאר את הקפה שחלמת עליו — ונמצא לך פולים, קלייה, טחינה, הכנה ומקומות רכישה.</p>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:30}}>
          {[{i:"⭐",t:"זן מוביל + 5 פולים חלופיים"},{i:"📍",t:"חנויות, אונליין ובתי קפה"},{i:"⚙️",t:"טחינה ואופן הכנה מפורטים"}].map(f=>(
            <div key={f.t} style={{display:"flex",alignItems:"center",gap:12,background:"rgba(255,255,255,0.04)",borderRadius:13,padding:"13px 16px",border:"1px solid rgba(255,255,255,0.07)"}}>
              <span style={{fontSize:20}}>{f.i}</span><span style={{fontSize:14,color:"#C8A87A"}}>{f.t}</span>
            </div>
          ))}
        </div>
        {locName&&<div style={{marginBottom:18,fontSize:13,color:"#5A4A30"}}>📍 <span style={{color:"#D4A843"}}>{locName}</span></div>}
        <button className="btn-primary" onClick={()=>setScreen("configure")}>בוא נמצא את הקפה שלך →</button>
      </div>
    </div>
  );

  if(screen==="configure") return(
    <div className="app">
      <div style={{maxWidth:660,margin:"0 auto",padding:"0 16px 80px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px",position:"sticky",top:0,background:"rgba(12,10,6,0.95)",zIndex:10,backdropFilter:"blur(10px)"}}>
          <button className="btn-ghost" onClick={()=>setScreen("intro")} style={{padding:"8px 16px",fontSize:13}}>← חזור</button>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:20,fontWeight:700,color:"#D4A843"}}>{pct}%</div>
            <div style={{fontSize:11,color:"#4A3A20"}}>{totalFilled}/{PARAMS.length}</div>
          </div>
        </div>
        <div style={{height:5,background:"rgba(255,255,255,0.07)",borderRadius:3,marginBottom:16}}>
          <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#D4A843,#F0C040)",borderRadius:3,transition:"width 0.4s ease"}}/>
        </div>
        <div className="section-box" style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:13,color:"#8A7355",marginBottom:8,fontWeight:500}}>✍️ תיאור חופשי (אופציונלי)</label>
          <textarea value={freeText} onChange={e=>setFreeText(e.target.value)} placeholder="למשל: קפה חזק, שוקולדי, מעט חמיצות..."/>
        </div>
        <div className="tabs">
          {PARAMS.map((p,i)=>{
            const n=cnt(p.id);
            return(
              <button key={p.id} className={`tab ${activeIdx===i?"active":""}`} onClick={()=>setActiveIdx(i)}>
                {p.icon} {p.label}{n>0&&<span className="badge">{n}</span>}
              </button>
            );
          })}
        </div>
        <div className="section-box fade-up" key={activeIdx}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <h2 style={{fontSize:17,color:"#F5EDD8",fontWeight:700,fontFamily:"'Playfair Display',serif",display:"flex",alignItems:"center",gap:8}}>
              <span>{ap.icon}</span>{ap.label}
            </h2>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>setShowInfo(v=>!v)} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,width:26,height:26,cursor:"pointer",color:"#6A4A30",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>?</button>
              <span style={{fontSize:12,color:cnt(ap.id)>=MAX_SEL?"#D4A843":"#4A3A20"}}>{cnt(ap.id)}/{MAX_SEL}</span>
            </div>
          </div>
          {showInfo&&ap.description&&<div className="info-box">{ap.description}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {ap.options.map(opt=>{
              const on=isOn(ap.id,opt);
              const disabled=!on&&cnt(ap.id)>=MAX_SEL;
              const desc=ap.optionDesc?.[opt];
              return(
                <button key={opt} className={`chip ${on?"on":""}`} disabled={disabled} onClick={()=>toggle(ap.id,opt)}
                  style={{opacity:disabled?0.3:1,display:"flex",flexDirection:"column",gap:3}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{width:17,height:17,borderRadius:5,border:`2px solid ${on?"#D4A843":"rgba(255,255,255,0.15)"}`,background:on?"#D4A843":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {on&&<span style={{color:"#0C0A06",fontSize:10,fontWeight:800}}>✓</span>}
                    </span>
                    <span style={{flex:1,textAlign:"right"}}>{opt}</span>
                  </div>
                  {desc&&<div style={{fontSize:11.5,color:on?"rgba(212,168,67,0.7)":"#4A3A20",lineHeight:1.45,paddingRight:25,textAlign:"right"}}>{desc}</div>}
                </button>
              );
            })}
          </div>
          {cnt(ap.id)>0&&<button onClick={()=>setSel(prev=>({...prev,[ap.id]:undefined}))} style={{marginTop:10,background:"none",border:"none",color:"#4A3A20",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>נקה ×</button>}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:16}}>
            <button className="btn-ghost" onClick={()=>setActiveIdx(i=>Math.max(0,i-1))} disabled={activeIdx===0} style={{fontSize:13,padding:"8px 16px",opacity:activeIdx===0?0.3:1}}>← הקודם</button>
            {activeIdx<PARAMS.length-1
              ?<button className="btn-ghost" onClick={()=>setActiveIdx(i=>i+1)} style={{fontSize:13,padding:"8px 16px"}}>הבא →</button>
              :<span style={{fontSize:12,color:"#4A3A20",alignSelf:"center"}}>✅ כל הפרמטרים</span>
            }
          </div>
        </div>
        {totalFilled>0&&<div className="sel-summary">
          <div style={{fontSize:12,color:"#5A4A30",marginBottom:7}}>הבחירות שלך:</div>
          <div style={{display:"flex",flexWrap:"wrap"}}>
            {Object.entries(sel).filter(([,v])=>v?.length).map(([k,v])=>{
              const p=PARAMS.find(x=>x.id===k);
              return v.map(val=><span key={k+val} className="tag">{p?.icon} {val}</span>);
            })}
          </div>
        </div>}
        <div style={{textAlign:"center"}}>
          {canSearch
            ?<button className="btn-primary" onClick={search} style={{width:"100%",maxWidth:400,padding:"17px 0",fontSize:17}}>☕ מצא לי את הקפה המושלם</button>
            :<p style={{color:"#3A2A18",fontSize:13}}>בחר לפחות אפשרות אחת כדי להמשיך</p>
          }
          {error&&<p style={{color:"#E87A7A",marginTop:12,fontSize:13}}>{error}</p>}
        </div>
      </div>
    </div>
  );

  if(screen==="result"&&result) return(
    <div className="app">
      <div style={{maxWidth:660,margin:"0 auto",padding:"0 16px 80px"}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"18px 0 22px"}}>
          <button className="btn-ghost" onClick={()=>setScreen("configure")} style={{fontSize:13,padding:"8px 16px"}}>← ערוך</button>
          <button className="btn-ghost" onClick={()=>{setSel({});setFreeText("");setScreen("intro");setResult(null);}} style={{fontSize:13,padding:"8px 16px"}}>חיפוש חדש</button>
        </div>
        <div className="hero fade-up">
          <div style={{fontSize:44,marginBottom:10}}>✨</div>
          <h2 className="display" style={{fontSize:"clamp(20px,5vw,30px)",color:"#F5EDD8",marginBottom:10,lineHeight:1.2}}>{result.coffeeMatch?.name}</h2>
          <p style={{fontSize:14.5,color:"#C8A87A",lineHeight:1.8,marginBottom:13}}>{result.coffeeMatch?.description}</p>
          <div style={{display:"inline-block",background:"rgba(212,168,67,0.1)",borderRadius:11,padding:"9px 16px",fontSize:13.5,color:"#D4A843"}}>💡 {result.coffeeMatch?.whyMatch}</div>
        </div>
        {result.tips&&<div className="grid-2" style={{marginBottom:20}}>
          {[{icon:"⚙️",label:"טחינה",text:result.tips.grind},{icon:"📦",label:"אחסון",text:result.tips.storage},{icon:"📅",label:"טריות",text:result.tips.freshness}].filter(t=>t.text).map(t=>(
            <div key={t.label} className="tip-card">
              <div style={{fontSize:18,marginBottom:5}}>{t.icon}</div>
              <div style={{fontSize:11,color:"#D4A843",fontWeight:600,marginBottom:3}}>{t.label}</div>
              <div style={{fontSize:12.5,color:"#8A7355",lineHeight:1.6}}>{t.text}</div>
            </div>
          ))}
        </div>}
        {result.topBean&&<div style={{marginBottom:24}}>
          <h3 className="display" style={{fontSize:21,color:"#F5EDD8",marginBottom:13}}>⭐ הזן המומלץ ביותר</h3>
          <BeanCard bean={result.topBean} isTop={true} idx={0}/>
        </div>}
        {result.alternatives?.length>0&&<div style={{marginBottom:24}}>
          <h3 className="display" style={{fontSize:21,color:"#F5EDD8",marginBottom:13}}>🫘 פולים נוספים מומלצים</h3>
          {result.alternatives.map((bean,i)=><BeanCard key={i} bean={bean} isTop={false} idx={i+1}/>)}
        </div>}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
