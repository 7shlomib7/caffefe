<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Caffefe ☕</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4A843;--gold-dim:rgba(212,168,67,0.15);--gold-border:rgba(212,168,67,0.25);--bg:#0C0A06;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);--text:#F5EDD8;--muted:#8A7355;--muted2:#5A4A30}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);direction:rtl;min-height:100vh}
.app{min-height:100vh;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(212,168,67,0.12) 0%,transparent 70%),var(--bg)}
.display{font-family:'Playfair Display',serif}
.btn-primary{background:linear-gradient(135deg,#D4A843,#A07820);color:#0C0A06;border:none;border-radius:50px;padding:16px 48px;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.25s;box-shadow:0 8px 32px rgba(212,168,67,0.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(212,168,67,0.45)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--gold-border);color:var(--gold);border-radius:50px;padding:10px 24px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.btn-ghost:hover{background:var(--gold-dim)}
.chip{border:1px solid rgba(255,255,255,0.1);background:var(--surface);border-radius:12px;padding:10px 16px;font-size:13.5px;color:#C8A87A;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s;text-align:right;width:100%}
.chip:hover:not(:disabled){border-color:var(--gold-border);background:var(--gold-dim);color:var(--text)}
.chip.on{background:linear-gradient(135deg,rgba(212,168,67,0.25),rgba(160,120,32,0.2));border-color:var(--gold);color:var(--gold);font-weight:600}
.chip:disabled{opacity:0.3;cursor:not-allowed}
.card{background:var(--surface);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:20px;transition:border-color 0.2s;margin-bottom:12px}
.card:hover{border-color:var(--gold-border)}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:8px;padding:3px 10px;font-size:12px;color:var(--gold);margin:3px}
.info-box{background:rgba(212,168,67,0.07);border:1px solid rgba(212,168,67,0.2);border-radius:12px;padding:12px 16px;font-size:13px;color:#9A7840;line-height:1.7;border-right:3px solid rgba(212,168,67,0.5);margin-bottom:14px}
textarea{width:100%;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 16px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;resize:vertical;direction:rtl;min-height:80px;outline:none;transition:border 0.2s}
textarea:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px rgba(212,168,67,0.1)}
textarea::placeholder{color:var(--muted2)}
.tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;border-radius:11px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s;border:1px solid rgba(255,255,255,0.08);background:var(--surface);color:#6A4A30;display:flex;align-items:center;gap:5px}
.tab.active{background:rgba(212,168,67,0.22);border-color:var(--gold);color:var(--gold);font-weight:600}
.badge{background:#D4A843;color:#0C0A06;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:700}
.section-box{background:var(--surface);border:1px solid rgba(212,168,67,0.18);border-radius:18px;padding:20px;margin-bottom:16px}
.progress-bar{height:5px;background:rgba(255,255,255,0.07);border-radius:3px;margin-bottom:14px}
.progress-fill{height:100%;background:linear-gradient(90deg,#D4A843,#F0C040);border-radius:3px;transition:width 0.4s ease}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gold);display:inline-block;animation:bounce 1.2s infinite ease-in-out}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.4s ease both}
a{color:var(--gold);text-decoration:none}
a:hover{text-decoration:underline}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(212,168,67,0.2);border-radius:2px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.tip-card{background:var(--surface);border:1px solid rgba(255,255,255,0.07);border-radius:13px;padding:13px}
.grind-box{background:rgba(212,168,67,0.07);border:1px solid rgba(212,168,67,0.18);border-radius:12px;padding:13px;margin-bottom:10px}
.brew-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:13px;margin-bottom:10px}
.sel-summary{margin-bottom:16px;padding:13px 15px;background:rgba(212,168,67,0.05);border-radius:13px;border:1px solid rgba(212,168,67,0.12)}
.hero{text-align:center;padding:28px;margin-bottom:22px;background:linear-gradient(135deg,rgba(212,168,67,0.15),rgba(140,80,5,0.07));border-radius:22px;border:1px solid rgba(212,168,67,0.3)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const PARAMS = [
  {id:"strength",label:"עוצמה",icon:"⚡",description:"מידת האינטנסיביות של הקפה — תלויה בכמות הקפה, שיטת ההכנה ורמת הקלייה.",options:["עדין מאוד","עדין","בינוני","חזק","חזק מאוד","אקספרסו כפול"],optionDesc:{"עדין מאוד":"כמעט מימי — לרגישים לקפה","עדין":"קל ונעים","בינוני":"איזון קלאסי","חזק":"טעם בולט ומרוכז","חזק מאוד":"אינטנסיבי ועוצמתי","אקספרסו כפול":"מקסימום עוצמה בכמות קטנה"}},

  {id:"body",label:"גוף",icon:"🌊",description:"תחושת הסמיכות על הלשון — כמו ההבדל בין מים לחלב.",options:["קל ומימי","בינוני","מלא וסמיך","קרמי מאוד","Velvet"],optionDesc:{"קל ומימי":"זורם ושקוף — פילטר בהיר","בינוני":"נוכחות מורגשת","מלא וסמיך":"הקפה יושב בפה, כבד ועשיר","קרמי מאוד":"כמו שוקולד חם","Velvet":"קטיפתי ומשיי — האספרסו הנדיר"}},

const MAX_SEL = 3;

const buildPrompt = (selText, freeText, loc) => `

    "brewingInstructions":{"ratio":"יחס","waterTemp":"טמפרטורה","brewTime":"זמן"},

function PurchaseLocations({locations, cafes}) {
  if (!locations?.length && !cafes?.length) return null;
  return (
    <div style={{marginTop:12}}>
      {locations?.length>0&&<div style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:"#D4A843",marginBottom:6}}>🛒 מקומות רכישה</div>
        {locations.map((loc,i)=>(
          <div key={i} style={{background:"rgba(212,168,67,0.06)",borderRadius:10,padding:"8px 12px",marginBottom:6,fontSize:12.5}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:"#C8A87A",fontWeight:600}}>{loc.name}</span>
              {loc.distance&&<span style={{fontSize:11,color:loc.distance==="קרוב"?"#70C870":"#8A7355"}}>{loc.distance}</span>}
            </div>
            {loc.address&&<div style={{color:"#6A4A30",marginTop:2}}>📍 {loc.address}{loc.city?`, ${loc.city}`:""}</div>}
            {loc.price&&<div style={{color:"#D4A843",marginTop:2}}>{loc.price}</div>}
            {loc.shipsTo&&<div style={{color:"#6A4A30",marginTop:2}}>🚚 {loc.shipsTo}</div>}
            {loc.url&&loc.url.startsWith("http")&&(
              <a href={loc.url} target="_blank" rel="noopener noreferrer"
                style={{display:"inline-block",marginTop:4,color:"#D4A843",fontSize:12,textDecoration:"underline"}}>
                🔗 לאתר הרכישה
              </a>
            )}
          </div>
        ))}
      </div>}
      {cafes?.length>0&&<div>
        <div style={{fontSize:12,fontWeight:700,color:"#D4A843",marginBottom:6}}>🏪 בתי קפה</div>
        {cafes.map((cafe,i)=>(
          <div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"8px 12px",marginBottom:6,fontSize:12.5}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#C8A87A",fontWeight:600}}>{cafe.name}</span>
              {cafe.distance&&<span style={{fontSize:11,color:cafe.distance==="קרוב"?"#70C870":"#8A7355"}}>{cafe.distance}</span>}
            </div>
            {cafe.address&&<div style={{color:"#6A4A30",marginTop:2}}>📍 {cafe.address}{cafe.city?`, ${cafe.city}`:""}</div>}
            {cafe.specialty&&<div style={{color:"#8A7355",marginTop:2}}>✨ {cafe.specialty}</div>}
          </div>
        ))}
      </div>}
    </div>
  );
}

function BeanCard({bean, idx, isTop}) {
  const [open, setOpen] = useState(isTop);
  return (
    <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${open?(isTop?"rgba(212,168,67,0.5)":"rgba(212,168,67,0.25)"):"rgba(255,255,255,0.08)"}`,borderRadius:20,marginBottom:12,overflow:"hidden",transition:"border-color 0.2s"}}>
      <div style={{padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:12}} onClick={()=>setOpen(o=>!o)}>
        <div style={{width:30,height:30,borderRadius:9,background:isTop?"linear-gradient(135deg,#D4A843,#A07820)":"rgba(212,168,67,0.2)",display:"flex",alignItems:"center",justifyContent:"center",color:isTop?"#0C0A06":"#D4A843",fontWeight:800,fontSize:13,flexShrink:0}}>
          {isTop?"★":idx+1}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <h4 style={{fontSize:15.5,color:"#F5EDD8",fontWeight:600,marginBottom:3}}>{bean.name}</h4>
          {bean.variety&&<div style={{fontSize:12,color:"#5A4A30"}}>{bean.variety}</div>}
          <div style={{display:"flex",flexWrap:"wrap",marginTop:6}}>
            {bean.origin&&<span className="tag">🌍 {bean.origin}</span>}
            {bean.roastLevel&&<span className="tag">🔥 {bean.roastLevel}</span>}
            {bean.process&&<span className="tag">🫒 {bean.process}</span>}
            {bean.matchScore&&<span className="tag" style={{background:"rgba(100,200,100,0.1)",borderColor:"rgba(100,200,100,0.3)",color:"#70C870"}}>✓ {bean.matchScore}% התאמה</span>}
          </div>
        </div>
        <span style={{fontSize:17,color:"#4A3A20",transition:"transform 0.25s",display:"block",transform:open?"rotate(180deg)":"none",flexShrink:0}}>▾</span>
      </div>
      {open&&<div style={{padding:"0 18px 18px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
        {bean.matchExplanation&&<div style={{padding:"10px 12px",background:"rgba(100,200,100,0.06)",borderRadius:10,marginBottom:10,fontSize:13,color:"#8A9A80",lineHeight:1.6}}>
          💡 {bean.matchExplanation}
        </div>}
        {bean.flavorNotes&&<div style={{padding:"8px 0",fontSize:13.5,color:"#C8A87A"}}><span style={{color:"#6A4A30"}}>טעמים: </span>{bean.flavorNotes}</div>}
        {bean.grindRecommendation&&<div className="grind-box">
          <div style={{fontSize:13,fontWeight:700,color:"#D4A843",marginBottom:8}}>⚙️ המלצת טחינה</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 14px",fontSize:13}}>
            {bean.grindRecommendation.method&&<div><span style={{color:"#5A4A30"}}>שיטה: </span><span style={{color:"#D4C090"}}>{bean.grindRecommendation.method}</span></div>}
            {bean.grindRecommendation.grindSize&&<div><span style={{color:"#5A4A30"}}>דרגה: </span><span style={{color:"#D4C090"}}>{bean.grindRecommendation.grindSize}</span></div>}
            {bean.grindRecommendation.grindDescription&&<div style={{gridColumn:"1/-1"}}><span style={{color:"#5A4A30"}}>מרקם: </span><span style={{color:"#D4C090"}}>{bean.grindRecommendation.grindDescription}</span></div>}
            {bean.grindRecommendation.microns&&<div><span style={{color:"#5A4A30"}}>גודל: </span><span style={{color:"#D4C090"}}>{bean.grindRecommendation.microns}</span></div>}
          </div>
        </div>}
        {bean.brewingInstructions&&<div className="brew-box">
          <div style={{fontSize:13,fontWeight:700,color:"#C8A87A",marginBottom:8}}>☕ אופן הכנה</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 14px",fontSize:13,marginBottom:bean.brewingInstructions.steps?9:0}}>
            {bean.brewingInstructions.ratio&&<div><span style={{color:"#5A4A30"}}>יחס: </span><span style={{color:"#D4C090"}}>{bean.brewingInstructions.ratio}</span></div>}
            {bean.brewingInstructions.waterTemp&&<div><span style={{color:"#5A4A30"}}>טמפ׳: </span><span style={{color:"#D4C090"}}>{bean.brewingInstructions.waterTemp}</span></div>}
            {bean.brewingInstructions.brewTime&&<div><span style={{color:"#5A4A30"}}>זמן: </span><span style={{color:"#D4C090"}}>{bean.brewingInstructions.brewTime}</span></div>}
          </div>
          {bean.brewingInstructions.steps&&<div style={{fontSize:13,color:"#8A7355",lineHeight:1.7,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:9}}>{bean.brewingInstructions.steps}</div>}
        </div>}
        <PurchaseLocations locations={bean.purchaseLocations} cafes={bean.cafes}/>
        {bean.tip&&<div style={{marginTop:10,fontSize:13,color:"#D4A843",background:"rgba(212,168,67,0.06)",borderRadius:10,padding:"9px 13px"}}>💡 {bean.tip}</div>}
      </div>}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("intro");
  const [sel, setSel] = useState({});
  const [freeText, setFreeText] = useState("");
  const [activeIdx, setActiveIdx] = useState(0);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [locName, setLocName] = useState("");
  const [showInfo, setShowInfo] = useState(false);

  useEffect(()=>{
    navigator.geolocation?.getCurrentPosition(pos=>{
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)
        .then(r=>r.json()).then(d=>setLocName(d.address?.city||d.address?.town||"")).catch(()=>{});
    },()=>{});
  },[]);

  const toggle=(id,val)=>{
    setSel(prev=>{
      const cur=prev[id]||[];
      if(cur.includes(val)) return {...prev,[id]:cur.filter(v=>v!==val)};
      if(cur.length>=MAX_SEL) return prev;
      return {...prev,[id]:[...cur,val]};
    });
  };

  const isOn=(id,val)=>(sel[id]||[]).includes(val);
  const cnt=id=>(sel[id]||[]).length;
  const totalFilled=Object.values(sel).filter(v=>v?.length).length;
  const pct=Math.round((totalFilled/PARAMS.length)*100);
  const canSearch=totalFilled>=1||freeText.trim().length>3;
  const ap=PARAMS[activeIdx];

  const search=async()=>{
    setLoading(true);setError("");setResult(null);
    try{
      const selText=Object.entries(sel).filter(([,v])=>v?.length).map(([k,v])=>`${PARAMS.find(p=>p.id===k)?.label||k}: ${v.join(", ")}`).join("\n");
      const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({max_tokens:1000,messages:[{role:"user",content:buildPrompt(selText,freeText,locName)}]})});
      const data=await res.json();
      const txt=data.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
      const clean=txt.replace(/```json|```/g,"").trim();
      const s=clean.indexOf("{"),e=clean.lastIndexOf("}");
      setResult(JSON.parse(clean.slice(s,e+1)));
      setScreen("result");
    }catch{setError("שגיאה בטעינת ההמלצות — נסה שוב");}
    finally{setLoading(false);}
  };

  if(loading) return(
    <div className="app" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:20}}>
      <div style={{fontSize:48}}>☕</div>
      <div style={{display:"flex",gap:8}}><div className="dot"/><div className="dot"/><div className="dot"/></div>
      <p style={{color:"#8A7355",fontSize:15}}>מנתח את ההעדפות שלך...</p>
    </div>
  );

  if(screen==="intro") return(
    <div className="app">
      <div style={{maxWidth:520,margin:"0 auto",padding:"56px 20px",textAlign:"center"}}>
        <div style={{fontSize:60,marginBottom:14,filter:"drop-shadow(0 8px 24px rgba(212,168,67,0.5))"}}>☕</div>
        <h1 className="display" style={{fontSize:"clamp(30px,8vw,50px)",fontWeight:900,color:"#F5EDD8",lineHeight:1.1,marginBottom:10}}>
          Caffefe<br/><span style={{color:"#D4A843",fontSize:"0.7em"}}>מוצא הקפה המושלם</span>
        </h1>
        <p style={{fontSize:15,color:"#8A7355",lineHeight:1.8,marginBottom:28}}>תאר את הקפה שחלמת עליו — ונמצא לך את הפולים, הקלייה, הטחינה ואופן ההכנה המדויקים.</p>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:30}}>
          {[{i:"🎛️",t:"14 פרמטרים — עד 3 בחירות בכל אחד"},{i:"🫘",t:"פולים עם קלייה, טחינה ואופן הכנה"},{i:"🏪",t:"בתי קפה ומקומות לרכישה"}].map(f=>(
            <div key={f.t} style={{display:"flex",alignItems:"center",gap:12,background:"rgba(255,255,255,0.04)",borderRadius:13,padding:"13px 16px",border:"1px solid rgba(255,255,255,0.07)"}}>
              <span style={{fontSize:20}}>{f.i}</span><span style={{fontSize:14,color:"#C8A87A"}}>{f.t}</span>
            </div>
          ))}
        </div>
        {locName&&<div style={{marginBottom:18,fontSize:13,color:"#5A4A30"}}>📍 <span style={{color:"#D4A843"}}>{locName}</span></div>}
        <button className="btn-primary" onClick={()=>setScreen("configure")}>בוא נמצא את הקפה שלך →</button>
      </div>
    </div>
  );

  if(screen==="configure") return(
    <div className="app">
      <div style={{maxWidth:660,margin:"0 auto",padding:"0 16px 80px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px",position:"sticky",top:0,background:"rgba(12,10,6,0.95)",zIndex:10,backdropFilter:"blur(10px)"}}>
          <button className="btn-ghost" onClick={()=>setScreen("intro")} style={{padding:"8px 16px",fontSize:13}}>← חזור</button>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:20,fontWeight:700,color:"#D4A843"}}>{pct}%</div>
            <div style={{fontSize:11,color:"#4A3A20"}}>{totalFilled}/{PARAMS.length}</div>
          </div>
        </div>
        <div style={{height:5,background:"rgba(255,255,255,0.07)",borderRadius:3,marginBottom:16}}>
          <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#D4A843,#F0C040)",borderRadius:3,transition:"width 0.4s ease"}}/>
        </div>
        <div className="section-box" style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:13,color:"#8A7355",marginBottom:8,fontWeight:500}}>✍️ תיאור חופשי (אופציונלי)</label>
          <textarea value={freeText} onChange={e=>setFreeText(e.target.value)} placeholder="למשל: קפה חזק, שוקולדי, מעט חמיצות, עם חלב שיבולת שועל..."/>
        </div>
        <div className="tabs">
          {PARAMS.map((p,i)=>{
            const n=cnt(p.id);
            return(
              <button key={p.id} className={`tab ${activeIdx===i?"active":""}`} onClick={()=>setActiveIdx(i)}>
                {p.icon} {p.label}
                {n>0&&<span className="badge">{n}</span>}
              </button>
            );
          })}
        </div>
        <div className="section-box fade-up" key={activeIdx}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <h2 style={{fontSize:17,color:"#F5EDD8",fontWeight:700,fontFamily:"'Playfair Display',serif",display:"flex",alignItems:"center",gap:8}}>
              <span>{ap.icon}</span>{ap.label}
            </h2>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>setShowInfo(v=>!v)} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,width:26,height:26,cursor:"pointer",color:"#6A4A30",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>?</button>
              <span style={{fontSize:12,color:cnt(ap.id)>=MAX_SEL?"#D4A843":"#4A3A20"}}>{cnt(ap.id)}/{MAX_SEL}</span>
            </div>
          </div>
          {showInfo&&ap.description&&<div className="info-box">{ap.description}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {ap.options.map(opt=>{
              const on=isOn(ap.id,opt);
              const disabled=!on&&cnt(ap.id)>=MAX_SEL;
              const desc=ap.optionDesc?.[opt];
              return(
                <button key={opt} className={`chip ${on?"on":""}`} disabled={disabled} onClick={()=>toggle(ap.id,opt)}
                  style={{opacity:disabled?0.3:1,display:"flex",flexDirection:"column",gap:3}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{width:17,height:17,borderRadius:5,border:`2px solid ${on?"#D4A843":"rgba(255,255,255,0.15)"}`,background:on?"#D4A843":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.18s"}}>
                      {on&&<span style={{color:"#0C0A06",fontSize:10,fontWeight:800}}>✓</span>}
                    </span>
                    <span style={{flex:1,textAlign:"right"}}>{opt}</span>
                  </div>
                  {desc&&<div style={{fontSize:11.5,color:on?"rgba(212,168,67,0.7)":"#4A3A20",lineHeight:1.45,paddingRight:25,textAlign:"right"}}>{desc}</div>}
                </button>
              );
            })}
          </div>
          {cnt(ap.id)>0&&<button onClick={()=>setSel(prev=>({...prev,[ap.id]:undefined}))} style={{marginTop:10,background:"none",border:"none",color:"#4A3A20",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>נקה ×</button>}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:16}}>
            <button className="btn-ghost" onClick={()=>setActiveIdx(i=>Math.max(0,i-1))} disabled={activeIdx===0} style={{fontSize:13,padding:"8px 16px",opacity:activeIdx===0?0.3:1}}>← הקודם</button>
            {activeIdx<PARAMS.length-1
              ?<button className="btn-ghost" onClick={()=>setActiveIdx(i=>i+1)} style={{fontSize:13,padding:"8px 16px"}}>הבא →</button>
              :<span style={{fontSize:12,color:"#4A3A20",alignSelf:"center"}}>✅ כל הפרמטרים</span>
            }
          </div>
        </div>
        {totalFilled>0&&<div className="sel-summary">
          <div style={{fontSize:12,color:"#5A4A30",marginBottom:7}}>הבחירות שלך:</div>
          <div style={{display:"flex",flexWrap:"wrap"}}>
            {Object.entries(sel).filter(([,v])=>v?.length).map(([k,v])=>{
              const p=PARAMS.find(x=>x.id===k);
              return v.map(val=><span key={k+val} className="tag">{p?.icon} {val}</span>);
            })}
          </div>
        </div>}
        <div style={{textAlign:"center"}}>
          {canSearch
            ?<button className="btn-primary" onClick={search} style={{width:"100%",maxWidth:400,padding:"17px 0",fontSize:17}}>☕ מצא לי את הקפה המושלם</button>
            :<p style={{color:"#3A2A18",fontSize:13}}>בחר לפחות אפשרות אחת כדי להמשיך</p>
          }
          {error&&<p style={{color:"#E87A7A",marginTop:12,fontSize:13}}>{error}</p>}
        </div>
      </div>
    </div>
  );

  if(screen==="result"&&result) return(
    <div className="app">
      <div style={{maxWidth:660,margin:"0 auto",padding:"0 16px 80px"}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"18px 0 22px"}}>
          <button className="btn-ghost" onClick={()=>setScreen("configure")} style={{fontSize:13,padding:"8px 16px"}}>← ערוך</button>
          <button className="btn-ghost" onClick={()=>{setSel({});setFreeText("");setScreen("intro");setResult(null);}} style={{fontSize:13,padding:"8px 16px"}}>חיפוש חדש</button>
        </div>
        <div className="hero fade-up">
          <div style={{fontSize:44,marginBottom:10}}>✨</div>
          <h2 className="display" style={{fontSize:"clamp(20px,5vw,30px)",color:"#F5EDD8",marginBottom:10,lineHeight:1.2}}>{result.coffeeMatch?.name}</h2>
          <p style={{fontSize:14.5,color:"#C8A87A",lineHeight:1.8,marginBottom:13}}>{result.coffeeMatch?.description}</p>
          <div style={{display:"inline-block",background:"rgba(212,168,67,0.1)",borderRadius:11,padding:"9px 16px",fontSize:13.5,color:"#D4A843"}}>💡 {result.coffeeMatch?.whyMatch}</div>
        </div>
        {result.generalTips&&<div className="grid-2" style={{marginBottom:20}}>
          {[{icon:"⚙️",label:"טחינה",text:result.generalTips.grindGuide},{icon:"📦",label:"אחסון",text:result.generalTips.storageTip},{icon:"📅",label:"טריות",text:result.generalTips.freshnessTip}].filter(t=>t.text).map(t=>(
            <div key={t.label} className="tip-card">
              <div style={{fontSize:18,marginBottom:5}}>{t.icon}</div>
              <div style={{fontSize:11,color:"#D4A843",fontWeight:600,marginBottom:3}}>{t.label}</div>
              <div style={{fontSize:12.5,color:"#8A7355",lineHeight:1.6}}>{t.text}</div>
            </div>
          ))}
        </div>}
        {result.topBean&&<div style={{marginBottom:24}}>
          <h3 className="display" style={{fontSize:21,color:"#F5EDD8",marginBottom:13,display:"flex",alignItems:"center",gap:8}}>★ <span>הזן המומלץ ביותר</span></h3>
          <BeanCard bean={result.topBean} idx={0} isTop={true}/>
        </div>}
        {result.alternativeBeans?.length>0&&<div style={{marginBottom:24}}>
          <h3 className="display" style={{fontSize:21,color:"#F5EDD8",marginBottom:13,display:"flex",alignItems:"center",gap:8}}>🫘 <span>פולים נוספים מומלצים</span></h3>
          {result.alternativeBeans.map((bean,i)=><BeanCard key={i} bean={bean} idx={i} isTop={false}/>)}
        </div>}
        {result.beansGuide&&<div style={{marginBottom:24}}>
          <h3 className="display" style={{fontSize:21,color:"#F5EDD8",marginBottom:13,display:"flex",alignItems:"center",gap:8}}>🫘 <span>פולים מומלצים</span></h3>
          {result.beansGuide.recommendedBeans?.map((bean,i)=><BeanCard key={i} bean={bean} idx={i} isTop={i===0}/>)}
        </div>}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
